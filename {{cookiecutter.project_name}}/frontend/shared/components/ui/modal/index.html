<div x-data="modal"
     @open-modal.window="if ($event.detail === '{{ name }}') open()"
     @close-modal.window="if ($event.detail === '{{ name }}') close()"
     x-show="show"
     class="fixed inset-0 z-50 overflow-y-auto"
     x-cloak>
    <div class="flex min-h-screen items-end justify-center px-4 pt-4 pb-20 text-center sm:block sm:p-0">
        <div x-show="show"
             x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="ease-in duration-200"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             @click="close"
             class="bg-neutral/75 fixed inset-0 transition-opacity"
             aria-hidden="true"></div>
        <span class="hidden sm:inline-block sm:h-screen sm:align-middle"
              aria-hidden="true"></span>
        <div x-show="show"
             x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave="ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             class="bg-base-100 inline-block transform overflow-hidden rounded-lg px-4 pt-5 pb-4 text-left align-bottom shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg sm:p-6 sm:align-middle">
            <div>
                {% if title %}
                    <div class="mt-3 text-center sm:mt-5">
                        <h3 class="text-base-content text-lg leading-6 font-medium"
                            id="modal-title">{{ title }}</h3>
                    </div>
                {% endif %}
                <div class="mt-2">{{ slot }}</div>
            </div>
            {% if footer %}
                <div class="mt-5 sm:mt-6 sm:grid sm:grid-flow-row-dense sm:grid-cols-2 sm:gap-3">{{ footer }}</div>
            {% endif %}
        </div>
    </div>
</div>
