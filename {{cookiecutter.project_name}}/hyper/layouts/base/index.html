{% load static hyper_tags %}
<!DOCTYPE html>
<html lang="en" class="h-screen overflow-hidden">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="" />
        <meta name="keywords" content="" />
        <meta name="view-transition" content="same-origin" />
        <title>{{ page.title }}</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&display=swap"
              rel="stylesheet" />
        {% hyper_preloads %}
        {% hyper_stylesheets %}
        {% hyper_head_scripts %}
        <script src="{% static 'hyperdjango/hyper.js' %}"></script>
        <style nonce="{{ csp_nonce }}">
          [x-cloak] {
              display: none;
          }
        </style>
        {% block head_extras %}
        {% endblock head_extras %}
    </head>
    <body x-cloak class="h-screen overflow-hidden">
        {% block body %}
        {% endblock body %}
        {% hyper_body_scripts %}
        <ol id="sonner-toast-container"
            position="bottom-right"
            max-toasts="3"
            duration="5000"
            close-button="true"
            rich-colors="true"
            theme="light">
        </ol>
    </body>
</html>
