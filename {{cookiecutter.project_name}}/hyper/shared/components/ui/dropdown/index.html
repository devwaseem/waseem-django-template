<div x-data="dropdown"
     @click.away="close"
     class="dropdown {{ class }}{% if align == 'right' %} dropdown-end{% endif %}">
    <div @click="toggle" class="dropdown-trigger cursor-pointer">{{ trigger }}</div>
    <div x-show="open"
         x-transition:enter="transition ease-out duration-100"
         x-transition:enter-start="transform opacity-0 scale-95"
         x-transition:enter-end="transform opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-75"
         x-transition:leave-start="transform opacity-100 scale-100"
         x-transition:leave-end="transform opacity-0 scale-95"
         class="dropdown-content {% if align == 'right' %} origin-top-right{% else %} origin-top-left{% endif %} absolute right-0 left-0 mt-2 shadow-lg"
         x-cloak>
        <div class="py-1">{{ slot }}</div>
    </div>
</div>
